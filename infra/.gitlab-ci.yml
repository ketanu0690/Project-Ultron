stages:
  - install
  - lint
  - typecheck
  - test
  - build
  - e2e

variables:
  NODE_VERSION: '20'
  POSTGRES_USER: ultron
  POSTGRES_DB: ultron
  POSTGRES_PASSWORD: ci-e2e-password
  DATABASE_URL: postgresql://ultron:ci-e2e-password@postgres:5432/ultron
  NEXT_PUBLIC_API_URL: http://localhost:4000
  NEXT_PUBLIC_WS_URL: ws://localhost:4000/ws
  PLAYWRIGHT_BASE_URL: http://localhost:3000

default:
  image: node:${NODE_VERSION}-bookworm
  before_script:
    - npm ci

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - apps/*/node_modules/
    - packages/*/node_modules/

install:
  stage: install
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
      - apps/*/node_modules/
      - packages/*/node_modules/
    expire_in: 1 hour

lint:
  stage: lint
  needs: [install]
  script:
    - npm run lint

typecheck:
  stage: typecheck
  needs: [install]
  script:
    - npm run typecheck

test:api:
  stage: test
  needs: [install]
  script:
    - npm run test --workspace @ultron/api

test:web:
  stage: test
  needs: [install]
  script:
    - npm run test --workspace @ultron/web

build:
  stage: build
  needs: [lint, typecheck, test:api, test:web]
  script:
    - npm run build

e2e:galaxy-journey:
  stage: e2e
  needs: [build]
  allow_failure: true
  services:
    - name: pgvector/pgvector:pg16
      alias: postgres
  variables:
    FF_NETWORK_PER_BUILD: 'true'
  script:
    - npm run build --workspace @ultron/personality
    - npm run build --workspace @ultron/shared
    - npm run db:migrate:deploy --workspace @ultron/api
    - npm run db:seed --workspace @ultron/api
    - npm run start --workspace @ultron/api &
    - |
      for i in $(seq 1 30); do
        if wget -qO- http://localhost:4000/api/v1/health > /dev/null 2>&1; then
          echo "API ready"
          break
        fi
        sleep 2
      done
    - npm run build --workspace @ultron/web
    - npm run start --workspace @ultron/web &
    - |
      for i in $(seq 1 30); do
        if wget -qO- http://localhost:3000 > /dev/null 2>&1; then
          echo "Web ready"
          break
        fi
        sleep 2
      done
    - npx playwright install --with-deps chromium
    - npm run test:e2e:ci --workspace @ultron/web
  artifacts:
    when: on_failure
    paths:
      - apps/web/test-results/
      - apps/web/playwright-report/
    expire_in: 1 week
